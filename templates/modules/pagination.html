<!--
  统一分页组件（应用于首页、归档、分类、标签、作者、相册、瞬间等所有分页场景）
-->

<th:block th:fragment="pagination(data)">
  <nav
    class="pagination-wrapper sticky-pagination"
    th:if="${data.totalPages > 1}"
    th:aria-label="|第${data.page}页，共${data.totalPages}页|"
    th:attr="data-prev-url=${data.hasPrevious ? data.prevUrl : ''}, data-next-url=${data.hasNext ? data.nextUrl : ''}, data-current-page=${data.page}, data-total-pages=${data.totalPages}"
  >
    <a
      th:if="${data.hasPrevious}"
      th:href="${data.prevUrl}"
      class="button pagination-button rtl-flip"
      aria-label="上一页"
    >
      <span class="icon-[ph--arrow-fat-left-duotone]"></span>
    </a>
    <button
      th:unless="${data.hasPrevious}"
      class="button pagination-button rtl-flip"
      type="button"
      aria-label="上一页"
      disabled
    >
      <span class="icon-[ph--arrow-fat-left-duotone]"></span>
    </button>

    <button
      th:if="${data.page > 3}"
      class="pagination-num"
      type="button"
      data-page="1"
      aria-label="第1页"
      onclick="goToPageNumber(this)"
    >
      1
    </button>
    <button th:if="${data.page > 4}" class="pagination-num pagination-ellipsis" type="button" disabled>…</button>

    <button
      th:if="${data.page > 2}"
      class="pagination-num"
      type="button"
      th:attr="data-page=${data.page - 2}, aria-label=|第${data.page - 2}页|"
      th:text="${data.page - 2}"
      onclick="goToPageNumber(this)"
    ></button>

    <button
      th:if="${data.page > 1}"
      class="pagination-num"
      type="button"
      th:attr="data-page=${data.page - 1}, aria-label=|第${data.page - 1}页|"
      th:text="${data.page - 1}"
      onclick="goToPageNumber(this)"
    ></button>

    <button class="pagination-num active" type="button" th:attr="aria-label=|第${data.page}页|" disabled>
      <span th:text="${data.page}"></span>
    </button>

    <button
      th:if="${data.page < data.totalPages}"
      class="pagination-num"
      type="button"
      th:attr="data-page=${data.page + 1}, aria-label=|第${data.page + 1}页|"
      th:text="${data.page + 1}"
      onclick="goToPageNumber(this)"
    ></button>

    <button
      th:if="${data.page < data.totalPages - 1}"
      class="pagination-num"
      type="button"
      th:attr="data-page=${data.page + 2}, aria-label=|第${data.page + 2}页|"
      th:text="${data.page + 2}"
      onclick="goToPageNumber(this)"
    ></button>

    <button
      th:if="${data.page < data.totalPages - 3}"
      class="pagination-num pagination-ellipsis"
      type="button"
      disabled
    >
      …
    </button>
    <button
      th:if="${data.page < data.totalPages - 2}"
      class="pagination-num"
      type="button"
      th:attr="data-page=${data.totalPages}, aria-label=|第${data.totalPages}页|"
      th:text="${data.totalPages}"
      onclick="goToPageNumber(this)"
    ></button>

    <a th:if="${data.hasNext}" th:href="${data.nextUrl}" class="button pagination-button rtl-flip" aria-label="下一页">
      <span class="icon-[ph--arrow-fat-right-duotone]"></span>
    </a>
    <button
      th:unless="${data.hasNext}"
      class="button pagination-button rtl-flip"
      type="button"
      aria-label="下一页"
      disabled
    >
      <span class="icon-[ph--arrow-fat-right-duotone]"></span>
    </button>
    <!-- 分页跳转 start -->
    <div th:if="${theme.config.custom.enable_page_jump}" class="pagination-jump">
      <input
        type="number"
        id="pagination-jump-input"
        class="pagination-jump-input"
        min="1"
        th:max="${data.totalPages}"
        th:attr="data-total-pages=${data.totalPages}"
        placeholder="页码"
        aria-label="输入页码"
      />
      <button type="button" class="pagination-jump-btn" aria-label="跳转到指定页" title="跳转">
        <span class="icon-[ph--paper-plane-tilt]"></span>
      </button>
    </div>
    <!-- 分页跳转 end -->
  </nav>
  <div th:if="${data.totalPages > 1}" class="pagination-anchor" aria-hidden="true"></div>
</th:block>

<th:block th:fragment="paginationIndex(data)">
  <th:block th:replace="~{modules/pagination :: pagination(data=${data})}" />
</th:block>

<th:block th:fragment="paginationWithNumbers(data, urlPattern, firstPageUrl)">
  <th:block th:replace="~{modules/pagination :: pagination(data=${data})}" />
</th:block>
