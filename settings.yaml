apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-clarity-setting
spec:
  forms:
    - group: header
      label: 侧边栏头部
      formSchema:
        - $el: div
          attrs:
            class: "text-sm"
            style: |
              margin-bottom: 1rem;
              margin-top: -0.5rem;
              padding: 0.75rem 1rem;
              background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
              border-radius: 0.5rem;
              border: 1px solid #bae6fd;
          children:
            - $el: div
              attrs:
                style: |
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  flex-wrap: wrap;
                  gap: 0.5rem;
              children:
                - $el: span
                  attrs:
                    style: "color: #0369a1;"
                  children: "💬 遇到问题？加入 QQ 群 766203360 获取帮助"
                - $el: div
                  attrs:
                    style: "display: flex; gap: 0.5rem;"
                  children:
                    - $el: a
                      attrs:
                        href: "https://qm.qq.com/q/mPJeUOtG5G"
                        target: "_blank"
                        style: |
                          color: #fff;
                          background: #0ea5e9;
                          padding: 0.25rem 0.75rem;
                          border-radius: 0.25rem;
                          text-decoration: none;
                          font-size: 0.75rem;
                      children: "加入群聊"
                    - $el: button
                      attrs:
                        type: "button"
                        onclick: "navigator.clipboard.writeText('766203360').then(() => alert('已复制'))"
                        style: |
                          color: #0369a1;
                          background: #fff;
                          padding: 0.25rem 0.75rem;
                          border-radius: 0.25rem;
                          border: 1px solid #7dd3fc;
                          cursor: pointer;
                          font-size: 0.75rem;
                      children: "复制群号"
            - $el: a
              attrs:
                href: "https://docs.lik.cc"
                target: "_blank"
                style: |
                  display: inline-flex;
                  align-items: center;
                  color: #0369a1;
                  margin-top: 0.5rem;
                  font-size: 0.75rem;
              children:
                - $el: span
                  children: "📖 查看主题文档"
                - $el: img
                  attrs:
                    src: "/themes/theme-clarity/assets/images/link.svg"
                    width: "12px"
                    height: "12px"
                    style: "margin-left: 4px; opacity: 0.7;"
        - $formkit: attachment
          name: logo
          label: Logo
          accepts:
            - "image/*"
        - $formkit: switch
          name: show_title
          id: show_title
          label: 显示标题
          value: true
        - $formkit: text
          name: subtitle
          label: 副标题
          value: "Just another Halo site"
          placeholder: 一句话介绍
          if: "$get(show_title).value === true"
        - $formkit: text
          name: emoji_tail
          label: Emoji 尾巴
          value: "📄,🦌,🙌,🐟,🏖️"
          help: 使用英文逗号分隔，例如：📄,🦌,🙌,🐟,🏖️
          if: "$get(show_title).value === true"
        - $formkit: menuRadio
          name: primary_menu
          label: 主导航菜单
          help: 不选择则不显示导航菜单
        - $formkit: switch
          name: menu_icon_color_invert
          label: 菜单图标颜色反转
          value: false
          help: 增加深色模式下黑色图标的可见性
        - $formkit: switch
          name: userAuth
          id: userAuth
          key: userAuth
          label: 用户登录
          help: 不选择则不显示用户登录
          value: true
    - group: style
      label: 样式设置
      formSchema:
        - $formkit: color
          name: primary_color
          label: 主配色
          value: "#3b82f6"
          help: 用于按钮、链接、高亮等主要元素
          validation: required
        - $formkit: color
          name: accent_color
          label: 辅配色
          value: "#60a5fa"
          help: 用于次要高亮、悬停状态等
          validation: required
        - $formkit: select
          name: font_source
          id: font_source
          label: 字体来源
          value: theme
          help: 选择字体来源
          options:
            - value: theme
              label: 主题自带
            - value: system
              label: 系统字体
            - value: custom
              label: 自定义
        - $formkit: code
          if: "$get(font_source).value === 'custom'"
          name: custom_font_css
          id: custom_font_css
          label: 自定义字体 CSS
          language: css
          height: 150px
          help: 填写 @font-face 代码，留空则使用系统字体
        - $formkit: code
          name: logo_font_css
          label: Logo 字体样式
          language: css
          height: 150px
          help: 填写 @font-face 代码，font-family 必须改为 "Logo Font"（如阿里妈妈方圆体需将原 font-family 值替换），留空则使用系统字体（苹方/微软雅黑）
        - $formkit: select
          name: page_transition
          label: 页面切换动画
          value: fade-scale
          help: 页面跳转时的过渡动画效果（仅 Chrome 126+ 支持）
          options:
            - value: fade-scale
              label: 淡入淡出 + 缩放
            - value: sweep
              label: 黑幕扫光
            - value: none
              label: 无动画
        - $formkit: switch
          name: nav_active_indicator
          label: 菜单激活指示器
          value: true
          help: 高亮显示当前页面对应的侧边栏菜单项
        - $formkit: switch
          name: show_post_author
          label: 显示文章作者
          value: true
          help: 在首页文章卡片中显示作者头像和名称
        - $formkit: switch
          name: switch_category_layout
          label: 切换分类文章样式布局
          value: false
          help: 切换分类页面的文章列表样式布局
        - $formkit: switch
          name: switch_tag_layout
          label: 切换标签文章样式布局
          value: false
          help: 切换标签页面的文章列表样式布局
        - $formkit: radio
          name: theme_mode
          id: theme_mode
          label: 主题默认模式
          value: light
          options:
            - value: light
              label: 浅色模式
            - value: dark
              label: 深色模式
            - value: system
              label: 跟随系统

    - group: footer
      label: 页脚 & 社交
      formSchema:
        - $el: div
          attrs:
            class: "text-sm"
            style: |
              margin-bottom: 1rem;
              padding: 0.75rem 1rem;
              background: #fef3c7;
              border-radius: 0.5rem;
              border: 1px solid #fcd34d;
          children:
            - $el: div
              attrs:
                style: |
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  flex-wrap: wrap;
                  gap: 0.5rem;
              children:
                - $el: span
                  attrs:
                    style: "color: #92400e;"
                  children: "🔧 升级提示：如果升级主题后出现白屏、报错或图标不显示，请点击清理尝试修复"
                - $el: button
                  attrs:
                    type: "button"
                    style: |
                      color: #fff;
                      background: #f59e0b;
                      padding: 0.25rem 0.75rem;
                      border-radius: 0.25rem;
                      border: none;
                      cursor: pointer;
                      font-size: 0.75rem;
                    onclick: |
                      (async function(){
                        if(!confirm('确定要清理旧格式的图标数据吗？将清理：页脚链接、菜单、分类的旧图标。')) return;
                        let total = 0;
                        try {
                          // 1. 清理 ConfigMap 中的页脚图标
                          const res = await fetch('/api/v1alpha1/configmaps/theme-clarity-configMap');
                          const cm = await res.json();
                          if(cm.data.footer) {
                            const f = JSON.parse(cm.data.footer);
                            ['explore.links','links.items','social.items'].forEach(p => {
                              const ps = p.split('.');
                              let a = f;
                              for(const k of ps) a = a?.[k];
                              if(Array.isArray(a)) a.forEach(i => { if(typeof i.icon === 'string'){ delete i.icon; total++; }});
                            });
                            cm.data.footer = JSON.stringify(f);
                            await fetch('/api/v1alpha1/configmaps/theme-clarity-configMap', {
                              method: 'PUT',
                              headers: {'Content-Type': 'application/json'},
                              body: JSON.stringify(cm)
                            });
                          }
                          // 2. 清理菜单项 icon
                          const menuRes = await fetch('/api/v1alpha1/menuitems');
                          const menus = await menuRes.json();
                          for(const item of menus.items || []) {
                            const icon = item.metadata?.annotations?.icon;
                            if(icon && typeof icon === 'string' && !icon.startsWith('{')) {
                              delete item.metadata.annotations.icon;
                              await fetch('/api/v1alpha1/menuitems/' + item.metadata.name, {
                                method: 'PUT',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(item)
                              });
                              total++;
                            }
                          }
                          // 3. 清理分类 icon
                          const catRes = await fetch('/apis/content.halo.run/v1alpha1/categories');
                          const cats = await catRes.json();
                          for(const cat of cats.items || []) {
                            const icon = cat.metadata?.annotations?.categoryIicon;
                            if(icon && typeof icon === 'string' && !icon.startsWith('{')) {
                              delete cat.metadata.annotations.categoryIicon;
                              await fetch('/apis/content.halo.run/v1alpha1/categories/' + cat.metadata.name, {
                                method: 'PUT',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(cat)
                              });
                              total++;
                            }
                          }
                          if(total > 0) {
                            alert('已清理 ' + total + ' 个旧图标，请刷新页面后重新配置');
                            location.reload();
                          } else {
                            alert('没有需要清理的旧图标数据');
                          }
                        } catch(e) { alert('清理失败: ' + e.message); }
                      })();
                  children: "清理旧图标"
        - $formkit: group
          name: explore
          label: 探索
          help: 配置页脚左侧"探索"栏目
          children:
            - $formkit: text
              name: title
              label: 栏目标题
              value: 探索
              validation: required
            - $formkit: switch
              name: show_rss
              id: show_rss
              label: 显示 RSS 订阅
              value: true
            - $formkit: text
              name: rss_url
              label: RSS 地址
              value: /rss.xml
              placeholder: /rss.xml
              if: "$get(show_rss).value === true"
              validation: required
            - $formkit: switch
              name: show_travellings
              label: 显示开往
              value: true
              help: 开往是一个友链接力项目
            - $formkit: array
              name: links
              label: 自定义探索链接
              value: []
              itemLabels:
                - type: image
                  label: $value.icon.value
                - type: text
                  label: $value.text
              children:
                - $formkit: iconify
                  name: icon
                  label: 图标
                  format: dataurl
                - $formkit: text
                  name: text
                  label: 文本
                  placeholder: 我的链接
                  validation: required
                - $formkit: url
                  name: url
                  label: 链接
                  placeholder: https://example.com
                  validation: required

        - $formkit: group
          name: links
          label: 页脚链接
          help: 配置页脚中间自定义栏目
          children:
            - $formkit: text
              name: title
              label: 栏目标题
              value: 链接
              validation: required
            - $formkit: array
              name: items
              label: 链接列表
              value: []
              itemLabels:
                - type: image
                  label: $value.icon.value
                - type: text
                  label: $value.text
              children:
                - $formkit: iconify
                  name: icon
                  label: 图标
                  format: dataurl
                - $formkit: text
                  name: text
                  label: 文本
                  placeholder: 我的链接
                  validation: required
                - $formkit: url
                  name: url
                  label: 链接
                  placeholder: https://example.com
                  validation: required

        - $formkit: group
          name: social
          label: 侧边栏社交
          help: 配置侧边栏底部的社交图标
          children:
            - $formkit: array
              name: items
              label: 社交图标
              value: []
              itemLabels:
                - type: image
                  label: $value.icon.value
                - type: text
                  label: $value.text
              children:
                - $formkit: iconify
                  name: icon
                  label: 图标
                  format: dataurl
                  validation: required
                - $formkit: text
                  name: text
                  label: 描述
                  placeholder: GitHub
                  validation: required
                - $formkit: url
                  name: url
                  label: 链接
                  placeholder: https://github.com
                  validation: required

        - $formkit: text
          name: beian
          label: ICP 备案号
          placeholder: 陕ICP备2025082251号
        - $formkit: text
          name: gongan_beian
          label: 公安备案号
          placeholder: 陕公网安备61010302001234号
        - $formkit: switch
          name: enable_uptime_kuma
          id: enable_uptime_kuma
          label: 启用 Uptime Kuma 状态监控
          value: false
          help: 在页脚显示站点状态监控
        - $el: div
          if: "$get(enable_uptime_kuma).value === true"
          attrs:
            class: "text-sm"
            style: |
              display: inline-block;
              margin-top: 0.5rem;
              padding: 0.5rem 0.75rem;
              background: #fffbeb;
              border-radius: 0.375rem;
              border: 1px solid #fcd34d;
          children:
            - $el: span
              attrs:
                style: "color: #92400e;"
              children: "⚠️ 需要安装 "
            - $el: a
              attrs:
                href: "https://www.halo.run/store/apps/app-rtnbbgfk"
                target: "_blank"
                style: |
                  color: #d97706;
                  text-decoration: underline;
              children: "数据看板插件"
            - $el: span
              attrs:
                style: "color: #92400e;"
              children: " 并配置 Uptime Kuma"
    - group: music
      label: 音乐播放器
      formSchema:
        - $formkit: switch
          name: enabled
          id: music_enabled
          label: 启用音乐播放器
          value: false
          help: 在页面底部悬浮显示音乐播放器
        - $formkit: switch
          if: "$get(music_enabled).value === true"
          name: enabled_drag
          id: enabled_drag
          label: 启用音乐播放器拖拽功能
          value: false
          help: 启用后可以拖动音乐播放器到任意位置
        - $formkit: text
          name: api_url
          label: Meting API 代理地址
          placeholder: "https://api.i-meto.com/meting/api"
          help: 自定义 Meting API 地址，留空则使用默认公共接口
          if: "$get(music_enabled).value === true"
        - $formkit: text
          name: custom_params
          label: 自定义参数
          placeholder: "canshu=1&other=value"
          help: 额外 URL 参数，会拼接到 API 请求后面（不需要加 & 前缀）
          if: "$get(music_enabled).value === true"
        - $formkit: select
          name: server
          label: 音乐平台
          value: netease
          if: "$get(music_enabled).value === true"
          options:
            - value: netease
              label: 网易云音乐
            - value: tencent
              label: QQ 音乐
            - value: kugou
              label: 酷狗音乐
        - $formkit: select
          name: type
          label: 资源类型
          value: playlist
          if: "$get(music_enabled).value === true"
          options:
            - value: playlist
              label: 歌单
            - value: album
              label: 专辑
            - value: artist
              label: 歌手热门
            - value: song
              label: 单曲
        - $formkit: text
          name: id
          label: 资源 ID
          placeholder: "3778678"
          help: 歌单/专辑/歌手/歌曲 ID，可从分享链接中获取
          if: "$get(music_enabled).value === true"
        - $formkit: select
          name: order
          label: 播放顺序
          value: list
          if: "$get(music_enabled).value === true"
          options:
            - value: list
              label: 列表循环
            - value: random
              label: 随机播放
        - $formkit: radio
          name: position
          label: 播放器位置
          value: right
          if: "$get(music_enabled).value === true"
          help: 选择播放器悬浮位置
          options:
            - value: right
              label: 靠右
            - value: right-center
              label: 右中
            - value: left
              label: 靠左
            - value: left-center
              label: 左中
        - $formkit: number
          name: volume
          label: 默认音量
          value: 70
          min: 0
          max: 100
          help: 默认音量百分比（0-100）
          if: "$get(music_enabled).value === true"
        - $el: div
          if: "$get(music_enabled).value === true && $get(enable_pjax).value !== true"
          attrs:
            class: "text-sm"
            style: |
              display: inline-block;
              margin-top: 0.5rem;
              padding: 0.5rem 0.75rem;
              background: #eff6ff;
              border-radius: 0.375rem;
              border: 1px solid #93c5fd;
          children:
            - $el: span
              attrs:
                style: "color: #1e40af;"
              children: "💡 推荐在「自定义」分组开启 PJAX，可提升播放器与页面切换的整体流畅度。"
        - $formkit: switch
          name: autoplay
          label: 自动播放
          value: false
          help: 页面加载后自动播放（部分浏览器可能阻止）
          if: "$get(music_enabled).value === true"
        - $formkit: switch
          name: show_lrc
          label: 显示歌词
          value: true
          help: 展开播放器时显示滚动歌词
          if: "$get(music_enabled).value === true"
    - group: aside
      label: 右侧边栏
      formSchema:
        - $formkit: group
          name: widgets
          label: 小组件配置
          help: 拖拽调整顺序，越靠前优先级越高
          children:
            - $formkit: array
              name: index
              label: 首页侧边栏
              itemLabels:
                - type: text
                  label: $value.widget
              value:
                - widget: "stats"
                - widget: "tech-info"
              children:
                - $formkit: select
                  name: widget
                  label: 小组件
                  options:
                    - value: "stats"
                      label: 博客统计
                    - value: "tech-info"
                      label: 技术信息
                    - value: "weather"
                      label: 天气预报
                    - value: "moments"
                      label: 微语
                    - value: "community"
                      label: 社区群组
                    - value: "sponsor"
                      label: 云计算支持
                    - value: "promotion"
                      label: 推广轮播
                    - value: "activity-calendar"
                      label: 活跃日历
                    - value: "custom"
                      label: 自定义
                - $formkit: text
                  name: moments_title
                  label: 标题
                  value: "微语"
                  placeholder: 微语
                  if: "$value.widget === 'moments'"
                - $formkit: number
                  name: count
                  label: 显示条数
                  value: 3
                  min: 1
                  max: 10
                  if: "$value.widget === 'moments'"
                - $formkit: text
                  name: moments_no_text
                  label: 文案
                  value: ""
                  help: 当微语无文字时显示的文案，可为空。为空时默认显示“此+{微语标题}+无文字，请点击查看。”
                  if: "$value.widget === 'moments'"
                - $formkit: text
                  name: calendar_title
                  label: 标题
                  value: "活跃日历"
                  placeholder: 活跃日历
                  if: "$value.widget === 'activity-calendar'"
                - $formkit: number
                  name: activity_limit
                  label: 统计条数
                  value: 240
                  min: 30
                  max: 1000
                  help: 统计最近 N 条文章、瞬间、评论数据，数值越大越完整
                  if: "$value.widget === 'activity-calendar'"
                - $formkit: text
                  name: title
                  label: 自定义标题
                  if: "$value.widget === 'custom'"
                  placeholder: 小组件标题
                - $formkit: textarea
                  name: content
                  label: 自定义内容
                  if: "$value.widget === 'custom'"
                  placeholder: 支持 HTML
                  rows: 5
        - $formkit: group
          name: basic
          label: 基础设置
          children:
            - $formkit: date
              name: site_start_time
              label: 建站时间
              value: "2024-01-01"
              help: 用于计算运营时长
              validation: required
            - $formkit: text
              name: image_hosting
              label: 图片存储服务
              value: "本地存储"
            - $formkit: text
              name: license
              label: 许可协议名称
              value: "署名-非商业性使用-相同方式共享 4.0 国际"
              validation: required
            - $formkit: url
              name: license_url
              label: 许可协议链接
              value: "https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh-hans"
              validation: required
        - $formkit: group
          name: community
          label: 社区群组卡片
          children:
            - $formkit: attachment
              name: image
              label: 背景图
              accepts:
                - "image/*"
            - $formkit: text
              name: title
              label: 小标题
              value: "博客/技术社区"
            - $formkit: text
              name: name
              label: 群组名称
              value: "技术交流群"
            - $formkit: text
              name: desc
              label: 描述
              value: "169994096"
              help: "例如 QQ 群号"
        - $formkit: group
          name: sponsor
          label: 云计算支持卡片
          children:
            - $formkit: text
              name: title
              label: 标题
              value: "云计算支持"
            - $formkit: attachment
              name: logo
              label: Logo 图片
              accepts:
                - "image/*"
            - $formkit: text
              name: name
              label: 名称
              value: "速纳云计算"
            - $formkit: url
              name: url
              label: 链接
              placeholder: "https://example.com"
            - $formkit: text
              name: desc
              label: 描述
              value: "提供云计算服务"
              help: "显示在名称下方的说明文字"
        - $formkit: group
          name: weather
          label: 天气组件配置
          children:
            - $formkit: text
              name: seniverse_key
              label: 心知天气 API Key
              placeholder: 请输入心知天气 API Key
              help: "前往 https://www.seniverse.com 注册获取，免费版即可，自动根据访客 IP 定位"
        - $formkit: group
          name: promotion
          label: 推广轮播配置
          children:
            - $formkit: text
              name: title
              label: 标题
              value: "推广"
              placeholder: 推广
            - $formkit: number
              name: height
              label: 图片高度 (px)
              value: 120
              min: 80
              max: 300
              help: 轮播图片的显示高度（像素）
            - $formkit: number
              name: interval
              label: 自动切换间隔 (秒)
              value: 5
              min: 0
              max: 30
              help: 设为 0 则不自动切换
            - $formkit: number
              name: display_count
              label: 显示数量
              value: 6
              min: 1
              max: 20
              help: 前端最多显示的轮播项数量，超出部分不会渲染
            - $formkit: array
              name: items
              label: 轮播项
              value: []
              help: 显示数量由「显示数量」配置项控制
              itemLabels:
                - type: image
                  label: $value.image
                - type: text
                  label: $value.tip
              children:
                - $formkit: attachment
                  name: image
                  label: 图片
                  accepts:
                    - "image/*"
                  validation: required
                - $formkit: text
                  name: tip
                  label: 提示文字
                  placeholder: 图片描述
                - $formkit: url
                  name: url
                  label: 跳转链接
                  placeholder: https://example.com
                  help: 可选，点击图片跳转的地址
    - group: post
      label: 文章
      formSchema:
        - $formkit: group
          name: homepage
          label: 首页顶部小组件
          help: 拖拽调整顺序，越靠前优先级越高
          children:
            - $formkit: array
              name: widgets
              label: 小组件配置
              value: []
              itemLabels:
                - type: text
                  label: $value.widget
              children:
                - $formkit: select
                  name: widget
                  label: 小组件
                  options:
                    - value: "featured"
                      label: 精选文章
                    - value: "hot-post"
                      label: 热门文章
                    - value: "custom"
                      label: 自定义内容
                - $formkit: text
                  name: title
                  label: 标题
                  if: "$value.widget === 'custom'"
                  placeholder: 小组件标题
                - $formkit: textarea
                  name: content
                  label: 内容
                  if: "$value.widget === 'custom'"
                  placeholder: 支持 HTML
                  rows: 5
        - $formkit: group
          name: featured
          label: 精选文章配置
          children:
            - $formkit: text
              name: title
              label: 标题
              placeholder: 默认标题：精选文章
              value: "精选文章"
            - $formkit: postSelect
              name: posts
              label: 文章列表
              multiple: true
              help: 选择要在首页轮播展示的文章
        - $formkit: group
          name: hot_post
          label: 热门文章配置
          children:
            - $formkit: text
              name: title
              label: 标题
              placeholder: 默认标题：热门文章
              value: "热门文章"
            - $formkit: number
              name: post_number
              label: 文章数量
              value: 5
              min: 1
              max: 10
              help: 选择要在首页展示的热门文章数量
        - $formkit: switch
          name: enable_toolbar
          label: 关闭分类栏
          value: false
          help: 开启后将关闭分类栏
        - $formkit: radio
          name: cursor
          id: cursor
          label: 上下页排序
          value: true
          help: 倒序：从旧到新；正序：从新到旧。
          options:
            - value: true
              label: 倒序
            - value: false
              label: 正序
        - $formkit: switch
          name: default_cover
          id: default_cover
          label: 启用文章列表默认封面图
          value: true
          help: 当文章无封面图时，显示灰色背景+文章标题作为默认封面
        - $formkit: switch
          name: center_title
          id: center_title
          label: 标题居中显示
          value: false
          help: 开启后文章和页面的标题将居中显示
        - $formkit: switch
          name: show_excerpt
          id: show_excerpt
          label: 显示文章摘要框
          value: true
          help: 关闭后文章页顶部不再显示摘要框
        - $el: div
          if: "$get(show_excerpt).value === true"
          attrs:
            class: "text-sm"
            style: |
              display: inline-block;
              margin-top: 0.5rem;
              padding: 0.5rem 0.75rem;
              background: #fffbeb;
              border-radius: 0.375rem;
              border: 1px solid #fcd34d;
          children:
            - $el: span
              attrs:
                style: "color: #92400e;"
              children: "💡 已适配 "
            - $el: a
              attrs:
                href: "https://www.halo.run/store/apps/app-OWBzA"
                target: "_blank"
                style: |
                  color: #d97706;
                  text-decoration: underline;
              children: "智阅GPT AI摘要插件"
            - $el: span
              attrs:
                style: "color: #92400e;"
              children: "，安装后自动显示AI生成的摘要"
        - $formkit: group
          name: excerpt
          label: 摘要动画
          if: "$get(show_excerpt).value === true"
          children:
            - $formkit: switch
              name: animation
              id: excerpt_animation
              label: 启用打字机效果
              value: true
            - $formkit: number
              name: speed
              label: 打字速度（毫秒/字）
              value: 50
              min: 10
              max: 200
              help: 数值越小打字越快，建议 30-80
              if: "$get(excerpt_animation).value === true"
            - $formkit: text
              name: caret
              label: 光标字符
              value: "_"
              help: 打字时显示的光标符号
              if: "$get(excerpt_animation).value === true"
        - $formkit: group
          name: outdated_notice
          label: 过时文章提示
          help: 当文章发布时间超过设定天数时，显示过时提醒
          children:
            - $formkit: switch
              name: enabled
              id: outdated_enabled
              label: 启用过时提示
              value: true
            - $formkit: number
              name: days
              label: 过时天数
              value: 180
              min: 1
              max: 3650
              help: 文章发布超过此天数后显示过时提示
              if: "$get(outdated_enabled).value === true"
              validation: required|min:1|max:3650
            - $formkit: text
              name: message
              label: 提示文案
              value: "本文发布于 {days} 天前，内容可能已过时，请注意甄别。"
              help: 使用 {days} 作为实际天数的占位符
              if: "$get(outdated_enabled).value === true"
              validation: required
        - $formkit: attachment
          name: poster_default
          label: 海报默认封面图
          help: 默认封面图，用于文章无封面图时显示
          accepts:
            - "image/*"
    - group: comment
      label: 评论系统
      formSchema:
        - $formkit: select
          name: provider
          id: provider
          label: 评论系统
          value: halo
          help: 选择要使用的评论系统
          options:
            - value: halo
              label: Halo 原生评论
            - value: twikoo
              label: Twikoo 评论
        - $formkit: group
          name: twikoo
          id: twikoo
          label: Twikoo 配置
          if: "$get(provider).value === 'twikoo'"
          children:
            - $formkit: text
              name: env_id
              id: env_id
              label: Twikoo 服务端地址（envId）
              placeholder: https://your-worker.workers.dev
              help: 必填，填写 Twikoo 服务端地址（支持 Workers / Vercel / 腾讯云）
              validation: required
            - $formkit: text
              name: access_token
              id: access_token
              label: Access Token（可选）
              placeholder: 服务端开启鉴权时填写
            - $formkit: text
              name: region
              id: region
              label: 腾讯云地域（可选）
              placeholder: 例如 ap-guangzhou
              help: 仅腾讯云环境需要填写
            - $formkit: text
              name: custom_js_url
              id: custom_js_url
              label: Twikoo JS 地址
              value: /themes/theme-clarity/assets/libs/twikoo/twikoo.min.js
              placeholder: /themes/theme-clarity/assets/libs/twikoo/twikoo.min.js
              help: 自定义 Twikoo 脚本地址，留空则回退到主题默认内置地址
            - $formkit: select
              name: lang
              id: lang
              label: 评论语言
              value: zh-CN
              options:
                - value: zh-CN
                  label: 简体中文
                - value: en
                  label: English
    - group: links
      label: 友链页面
      formSchema:
        - $formkit: text
          name: title
          label: 页面标题
          value: 友链
          placeholder: 友链
          validation: required
        - $formkit: switch
          name: enable_random
          label: 启用随机访问
          value: true
          help: 开启后显示随机友链跳转按钮
        - $formkit: group
          name: my_info
          label: 我的博客信息
          help: 用于友链页面展示，留空则使用站点默认信息
          children:
            - $formkit: text
              name: title
              label: 博客名称
              placeholder: 留空则使用站点标题
            - $formkit: url
              name: url
              label: 网址
              placeholder: 留空则使用站点地址
            - $formkit: attachment
              name: logo
              label: Logo
              accepts:
                - "image/*"
              help: 留空则使用站点 Logo
            - $formkit: text
              name: description
              label: 描述
              placeholder: 留空则使用站点副标题
            - $formkit: url
              name: rss
              label: RSS 地址
              placeholder: 如 /rss.xml
        - $formkit: switch
          name: enable_submit
          id: enable_submit
          label: 启用自主提交
          value: false
          help: 开启后访客可自助提交友链申请
        - $el: div
          if: "$get(enable_submit).value === true"
          attrs:
            class: "text-sm"
            style: |
              display: inline-block;
              margin-top: 0.5rem;
              padding: 0.5rem 0.75rem;
              background: #fffbeb;
              border-radius: 0.375rem;
              border: 1px solid #fcd34d;
          children:
            - $el: span
              attrs:
                style: "color: #92400e;"
              children: "⚠️ 需要安装 "
            - $el: a
              attrs:
                href: "https://auth.muyin.site/archives/LinksSubmit"
                target: "_blank"
                style: |
                  color: #d97706;
                  text-decoration: underline;
              children: "友链自主提交插件"
        - $formkit: select
          name: verify_type
          label: 验证方式
          value: email
          help: 选择提交时的验证方式（只能选一种）
          if: "$get(enable_submit).value === true"
          options:
            - label: 邮箱验证码
              value: email
            - label: 图形验证码
              value: captcha
            - label: 无需验证
              value: none
        - $formkit: switch
          name: enable_update
          label: 允许修改友链
          value: false
          help: 开启后已提交的友链可凭邮箱验证修改信息
          if: "$get(enable_submit).value === true"
        - $formkit: code
          name: title_font_css
          label: 友链标题字体样式
          language: css
          height: 150px
          help: 填写 @font-face 代码，font-family 必须改为 "Links Title Font"（如阿里妈妈方圆体），留空则使用系统字体（苹方/微软雅黑）
        - $formkit: textarea
          name: apply_content
          label: 申请友链说明
          value: |
            <p>欢迎与我交换友链！请在评论区留下你的博客信息：</p>
            <ul>
              <li><strong>博客名称</strong>：你的博客标题</li>
              <li><strong>博客地址</strong>：你的博客 URL</li>
              <li><strong>博客描述</strong>：一句话介绍</li>
              <li><strong>博客头像</strong>：Logo 或头像链接</li>
            </ul>
            <p>我会尽快审核并添加你的友链。</p>
          rows: 8
          help: 支持 HTML 格式
    - group: plugins
      label: 插件适配
      formSchema:
        - $formkit: group
          name: moments
          label: 瞬间插件
          help: plugin-moments
          children:
            - $formkit: text
              name: title
              label: 页面标题
              value: 瞬间
              placeholder: 瞬间
              validation: required
            - $formkit: text
              name: moment_title
              label: 瞬间详情标题
              value: 瞬间详情
              placeholder: 瞬间详情
              validation: required
        - $formkit: group
          name: photos
          label: 图库插件
          help: plugin-photos
          children:
            - $formkit: text
              name: title
              label: 页面标题
              value: 图库
              placeholder: 图库
              validation: required
            - $formkit: text
              name: description
              label: 页面描述
              value: 记录生活中的美好瞬间
              placeholder: 记录生活中的美好瞬间
    - group: custom
      label: 自定义
      formSchema:
        - $formkit: radio
          name: title_type
          label: 网页标题分隔符
          help: 选择网页标题的分隔符（横线或竖线）
          value: "vertical"
          options:
            - value: "vertical"
              label: 竖线（页面 | 网站）
            - value: "across"
              label: 横线（页面 - 网站）
        - $formkit: switch
          name: img_alt
          id: img_alt
          key: img_alt
          label: 启用图片 alt 文本
          value: true
          help: 开启后图片将显示 alt 文本
        - $formkit: array
          if: "$get(img_alt).value === true"
          name: caption_blacklist
          id: caption_blacklist
          key: caption_blacklist
          label: alt 文本屏蔽列表
          value: []
          help: "添加需要屏蔽的图片 alt 文本类名，使主题在给图片添加 alt 文本时自动跳过此类名下的图片。"
          children:
            - $formkit: text
              name: class_name
              label: 需要屏蔽的图片 alt 文本类名
              placeholder: class_name
              validation: required
        - $formkit: switch
          name: enable_post_toc
          id: enable_post_toc
          key: enable_post_toc
          label: 启用文章目录
          value: true
          help: 开启后文章页面将显示目录
        - $formkit: switch
          name: enable_page_toc
          id: enable_page_toc
          key: enable_page_toc
          label: 启用独立页面目录
          value: false
          help: 开启后需要在页面设置中启用目录功能独立页面才会显示目录
        - $formkit: switch
          onValue: true
          offValue: false
          name: enable_edit
          id: enable_edit
          key: enable_edit
          label: 启用编辑按钮
          value: false
          help: 开启后文章/页面将显示编辑按钮
        - $formkit: switch
          onValue: true
          offValue: false
          name: enable_page_jump
          id: enable_page_jump
          key: enable_page_jump
          label: 启用分页跳转
          value: false
          help: 开启后分页将显示跳转功能
        - $formkit: number
          name: page_side_count
          id: page_side_count
          key: page_side_count
          label: 当前页两边显示数量（不包含首尾）
          value: 2
          min: 2
          max: 5
          help: 当前页左右两边各显示的页码数量，输入的最大值建议为 5
        - $formkit: switch
          name: archives_years
          id: archives_years
          key: archives_years
          label: 切换年龄来源
          value: true
          help: 开启后，年龄来源为建站时间，关闭后，年龄来源为网站拥有者的生日
        - $formkit: date
          if: "$get(archives_years).value === false"
          name: owner_birthday
          id: owner_birthday
          key: owner_birthday
          label: 你的生日
          value: "2001-01-01"
          help: 用于计算你的年龄
        - $formkit: switch
          onValue: true
          offValue: false
          name: enable_fancybox
          id: enable_fancybox
          key: enable_fancybox
          label: 关闭 FancyBox
          value: false
          help: 如果使用了其它灯箱插件，可以关闭 FancyBox 灯箱，避免重复加载
        - $formkit: switch
          onValue: true
          offValue: false
          name: enable_pjax
          id: enable_pjax
          key: enable_pjax
          label: 启用 PJAX
          value: false
          help: 开启后页面切换将使用 PJAX 技术，提升用户体验。注意：某些插件可能不兼容 PJAX ，使用 PJAX 需要舍弃一些功能。
        - $formkit: array
          name: preconnect_urls
          id: preconnect_urls
          key: preconnect_urls
          label: 预连接域名
          value: []
          help: "添加第三方服务域名以提前建立连接，提升加载速度（如统计服务、CDN 等）"
          children:
            - $formkit: url
              name: url
              label: 域名
              placeholder: https://hm.baidu.com
              validation: required
    - group: auth
      label: 认证设置
      formSchema:
        - $formkit: select
          name: style
          id: style
          key: style
          label: 风格选择
          value: "halo"
          options:
            - value: "halo"
              label: halo风格
            - value: "animated-characters"
              label: 动画字符登录风格
    - group: development
      label: 开发设置
      formSchema:
        - $formkit: switch
          name: enabled
          label: 启用开发模式
          value: false
          help: 仅供开发环境使用，开启此设置后，所有静态资源由 Vite 开发服务器提供，需要在本地启动 Vite 服务（pnpm dev）
